{{ define "title" }}{{ i18n "Tags" }} · {{ .Site.Title }}{{ end }}

{{ define "description" }}
<meta name="description" content="{{ i18n "Tags" }} - {{ .Site.Title }}">
{{ end }}

{{ define "main" }}
<div class="autopagerize_page_element">
  <div class="content">
    <section class="archive animated fadeInDown taxonomy-list-page">
      <p class="post-title">{{ i18n "Tags" }}</p>
      <ul class="listing taxonomy-list">
        {{ range .Data.Terms.Alphabetical }}
        <li class="listing-item">
          <div class="listing-post">
            <p class="post-title">
              <a href="{{ .Page.RelPermalink }}" title="{{ .Page.Title }}"># {{ .Page.Title }}</a>
            </p>
            <span class="date meta-item">{{ printf (i18n "TagCount") .Count }}</span>
          </div>
        </li>
        {{ end }}
      </ul>
    </section>
  </div>
</div>
{{ end }}
