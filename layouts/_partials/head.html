<head>
  <meta charset="utf-8">
  <meta name="X-UA-Compatible" content="IE=edge">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>

  {{ block "description" . }}
  <meta name="description" content="{{ with .Site.Params.description }}{{ . }}{{ else }}A Blog Powered By Hugo{{ end }}">
  {{ end }}

  {{ with .Params.keywords }}
  <meta name="keywords" content="{{ delimit . ", " }}">
  {{ else }}
  <meta name="keywords" content="{{ delimit .Site.Params.keywords ", " }}">
  {{ end }}

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport">
  <meta content="yes" name="apple-mobile-web-app-capable">
  <meta content="black" name="apple-mobile-web-app-status-bar-style">
  <meta content="telephone=no" name="format-detection">
  <meta name="renderer" content="webkit">

  <script>
    (function () {
      var key = 'theme';
      var defaultTheme = '{{ if or (eq .Site.Params.themeStyle "light") (eq .Site.Params.themeStyle "dark") }}{{ .Site.Params.themeStyle }}{{ else }}auto{{ end }}';
      var theme = defaultTheme;

      try {
        var saved = window.localStorage.getItem(key);
        if (saved === 'light' || saved === 'dark') {
          theme = saved;
        } else if (theme === 'auto') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
      } catch (error) {
        theme = defaultTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : defaultTheme;
      }

      if (theme === 'auto') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      document.documentElement.dataset.defaultTheme = defaultTheme;
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="short icon" href="{{ "images/favicon.png" | relURL }}" type="image/x-icon">

  {{ with resources.Get "scss/style.scss" }}
  {{ $style := . | toCSS | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  {{ end }}

  {{ if .Site.Params.social.rss }}
  {{ with site.Home.OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}">
  {{ end }}
  {{ end }}
</head>
